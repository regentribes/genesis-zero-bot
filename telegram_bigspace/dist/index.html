<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RegenTribes Digital Twin - Telegram Topic Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: #000; 
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            color: #fff;
        }
        #canvas { display: block; }
        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.85);
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            max-width: 350px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        #ui h1 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #00FF88;
        }
        #ui .stat { color: #aaa; }
        #ui .value { color: #fff; font-weight: bold; }
        #ui .author { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            color: #888;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #00FF88;
        }
        #hover-info {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 8px;
            max-width: 400px;
            font-size: 12px;
            display: none;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #hover-info .author-line {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        #hover-info .author-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        #hover-info .date { color: #888; font-size: 11px; }
        #hover-info .text { color: #ccc; margin-top: 8px; line-height: 1.5; }
        #hover-info .links { color: #4ECDC4; margin-top: 5px; font-size: 11px; }
    </style>
  <script type="module" crossorigin src="/big_space_telegram/assets/index-Ce269kDZ.js"></script>
</head>
<body>
    <div id="loading">Loading scene data...</div>
    <div id="ui" style="display:none">
        <h1>📍 Digital Twin Topic</h1>
        <div><span class="stat">Topic:</span> <span class="value" id="topic-name">-</span></div>
        <div><span class="stat">Messages:</span> <span class="value" id="msg-count">-</span></div>
        <div><span class="stat">Authors:</span> <span class="value" id="author-count">-</span></div>
        <div><span class="stat">Links:</span> <span class="value" id="link-count">-</span></div>
        <div style="margin-top:10px; border-top:1px solid rgba(255,255,255,0.1); padding-top:10px">
            <div class="stat">Legend:</div>
            <div id="legend"></div>
        </div>
        <div style="margin-top:10px; color:#666; font-size:11px">
            X-axis = time | Y = author | Z = text length<br>
            Lines = reply chains
        </div>
    </div>
    <div id="controls">
        Left-drag = orbit | Right-drag = pan | Scroll = zoom | Click = select
    </div>
    <div id="hover-info">
        <div class="author-line">
            <div class="author-dot"></div>
            <strong class="author-name"></strong>
        </div>
        <div class="date"></div>
        <div class="text"></div>
        <div class="links"></div>
    </div>
</body>
</html>
