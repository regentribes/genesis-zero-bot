<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph — Live</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }
        #graph-container { width: 100vw; height: 100vh; }

        /* Status bar */
        #status-bar {
            position: fixed;
            top: 16px;
            left: 16px;
            background: rgba(12, 12, 20, 0.92);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 14px 18px;
            z-index: 100;
            backdrop-filter: blur(16px);
            min-width: 180px;
        }
        #status-bar h2 {
            font-size: 10px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .live-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #ff4444;
            display: inline-block;
            transition: background 0.3s;
        }
        .live-dot.connected {
            background: #00ff88;
            box-shadow: 0 0 6px #00ff88;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .stat {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 12px;
        }
        .stat .label { color: #555; }
        .stat .value { color: #fff; font-weight: 500; font-variant-numeric: tabular-nums; }

        /* Hover panel */
        #hover-panel {
            position: fixed;
            bottom: 60px;
            left: 16px;
            background: rgba(12, 12, 20, 0.92);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 14px 18px;
            z-index: 100;
            backdrop-filter: blur(16px);
            max-width: 340px;
            display: none;
        }
        #hover-panel.visible { display: block; }
        #hover-panel h3 { font-size: 15px; color: #fff; margin-bottom: 4px; word-break: break-word; }
        .type-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #000;
            margin-bottom: 6px;
        }
        #hover-panel p { font-size: 12px; color: #777; line-height: 1.5; word-break: break-word; }
        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            margin-top: 8px;
            font-size: 11px;
        }
        .meta-item {
            background: rgba(255,255,255,0.03);
            padding: 5px 7px;
            border-radius: 4px;
        }
        .meta-item .lbl { color: #444; display: block; font-size: 9px; text-transform: uppercase; }
        .meta-item .val { color: #ccc; }

        /* Legend */
        #legend {
            position: fixed;
            top: 16px;
            right: 16px;
            background: rgba(12, 12, 20, 0.88);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 12px 14px;
            z-index: 100;
            backdrop-filter: blur(12px);
            font-size: 11px;
            max-height: 50vh;
            overflow-y: auto;
        }
        #legend h4 {
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 9px;
            margin-bottom: 6px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 3px;
            color: #888;
        }
        .legend-color {
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 7px;
            flex-shrink: 0;
        }

        /* Search */
        #search-box {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
        #search-input {
            background: rgba(12, 12, 20, 0.9);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: #fff;
            padding: 8px 18px;
            font-size: 13px;
            width: 300px;
            outline: none;
            backdrop-filter: blur(12px);
            transition: border-color 0.2s;
        }
        #search-input:focus { border-color: rgba(0,212,255,0.5); }
        #search-input::placeholder { color: #444; }

        /* Activity feed */
        #feed {
            position: fixed;
            bottom: 60px;
            right: 16px;
            background: rgba(12, 12, 20, 0.88);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 10px 14px;
            z-index: 100;
            backdrop-filter: blur(12px);
            max-width: 280px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 11px;
        }
        #feed h4 {
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 9px;
            margin-bottom: 6px;
        }
        .feed-item {
            color: #666;
            padding: 2px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            animation: feed-in 0.5s ease-out;
        }
        .feed-item .new-name { color: #00ff88; font-weight: 500; }
        .feed-item .new-verb { color: #ffbe0b; }
        @keyframes feed-in {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Loading */
        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.6s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        #loading span { color: #00d4ff; font-size: 14px; }
    </style>
</head>
<body>
    <div id="loading"><span>Connecting to knowledge graph...</span></div>
    <div id="graph-container"></div>

    <!-- Status -->
    <div id="status-bar">
        <h2><span class="live-dot" id="live-dot"></span> Knowledge Graph</h2>
        <div class="stat"><span class="label">Concepts</span><span class="value" id="node-count">0</span></div>
        <div class="stat"><span class="label">Relations</span><span class="value" id="link-count">0</span></div>
        <div class="stat"><span class="label">New this session</span><span class="value" id="new-count">0</span></div>
    </div>

    <!-- Hover details -->
    <div id="hover-panel">
        <h3 id="h-name">-</h3>
        <span class="type-badge" id="h-type">-</span>
        <p id="h-desc">-</p>
        <div class="meta-grid">
            <div class="meta-item"><span class="lbl">Rung</span><span class="val" id="h-rung">-</span></div>
            <div class="meta-item"><span class="lbl">Confidence</span><span class="val" id="h-conf">-</span></div>
            <div class="meta-item"><span class="lbl">Evidence</span><span class="val" id="h-evid">-</span></div>
            <div class="meta-item"><span class="lbl">Connections</span><span class="val" id="h-conn">-</span></div>
        </div>
    </div>

    <!-- Legend -->
    <div id="legend">
        <h4>Concept Types</h4>
    </div>

    <!-- Search -->
    <div id="search-box">
        <input type="text" id="search-input" placeholder="Search concepts..." autocomplete="off">
    </div>

    <!-- Activity Feed -->
    <div id="feed">
        <h4>Live Activity</h4>
        <div id="feed-items"></div>
    </div>

    <script src="https://unpkg.com/three@0.175.0/build/three.module.min.js" type="module"></script>
    <script src="https://unpkg.com/3d-force-graph@1.77.7/dist/3d-force-graph.min.js"></script>
    <script>
    (function() {
        // ── Config ──────────────────────────────────────────────────────
        // Production: wss via nginx reverse proxy. Local dev: replaced by live_server.py
        const WS_URL = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
            ? '__WS_URL__'
            : (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
        const GLOW_DURATION = 6000; // ms — how long new nodes glow
        const RECONNECT_DELAY = 3000;

        const TYPE_COLORS = {
            entity: '#00d4ff', system: '#ff6b35', process: '#7b2cbf',
            idea: '#2ec4b6', event: '#ffbe0b', person: '#e71d36',
            place: '#06d6a0', attribute: '#9b5de5', quantity: '#f15bb5',
            quality: '#00bbf9', project: '#80ed99', organization: '#ff9f1c',
            skill: '#fdcb6e', resource: '#74b9ff', practice: '#a29bfe',
        };

        // ── State ───────────────────────────────────────────────────────
        let graph = null;
        let ws = null;
        let graphData = { nodes: [], links: [] };
        let nodeMap = {};         // id -> node
        let connectionCount = {}; // id -> count
        let newNodeTimes = {};    // id -> timestamp (for glow effect)
        let newCount = 0;
        let searchTerm = '';
        let hoveredNode = null;

        // ── Legend ──────────────────────────────────────────────────────
        const legendEl = document.getElementById('legend');
        const seenTypes = new Set();
        function updateLegend(type) {
            if (seenTypes.has(type)) return;
            seenTypes.add(type);
            const item = document.createElement('div');
            item.className = 'legend-item';
            item.innerHTML = `<span class="legend-color" style="background:${TYPE_COLORS[type] || '#666'}"></span>${type}`;
            legendEl.appendChild(item);
        }

        // ── Feed ────────────────────────────────────────────────────────
        const feedEl = document.getElementById('feed-items');
        function addFeedItem(html) {
            const div = document.createElement('div');
            div.className = 'feed-item';
            div.innerHTML = html;
            feedEl.insertBefore(div, feedEl.firstChild);
            // Keep max 20 items
            while (feedEl.children.length > 20) feedEl.removeChild(feedEl.lastChild);
        }

        // ── Connection counts ───────────────────────────────────────────
        function rebuildConnectionCounts() {
            connectionCount = {};
            graphData.links.forEach(l => {
                const s = (typeof l.source === 'object') ? l.source.id : l.source;
                const t = (typeof l.target === 'object') ? l.target.id : l.target;
                connectionCount[s] = (connectionCount[s] || 0) + 1;
                connectionCount[t] = (connectionCount[t] || 0) + 1;
            });
        }

        // ── Search highlight ────────────────────────────────────────────
        document.getElementById('search-input').addEventListener('input', e => {
            searchTerm = e.target.value.toLowerCase().trim();
            // Force re-render
            if (graph) {
                graph.nodeColor(graph.nodeColor());
                graph.nodeVal(graph.nodeVal());
            }
        });

        // ── Initialize 3D graph ─────────────────────────────────────────
        function initGraph() {
            graph = ForceGraph3D()(document.getElementById('graph-container'))
                .backgroundColor('#0a0a0f')
                .nodeResolution(12)
                .linkResolution(4)

                // Node appearance
                .nodeColor(node => {
                    // Search highlight
                    if (searchTerm && !node.name.toLowerCase().includes(searchTerm)) {
                        return 'rgba(40,40,50,0.3)';
                    }
                    // New node glow
                    const newTime = newNodeTimes[node.id];
                    if (newTime) {
                        const age = Date.now() - newTime;
                        if (age < GLOW_DURATION) {
                            const t = age / GLOW_DURATION;
                            // Glow from white to type color
                            return t < 0.3 ? '#ffffff' : (TYPE_COLORS[node.type] || '#ffffff');
                        }
                        delete newNodeTimes[node.id];
                    }
                    return TYPE_COLORS[node.type] || '#ffffff';
                })
                .nodeVal(node => {
                    const base = Math.max(2, Math.sqrt(node.evidence_count || 1) * 2.5);
                    // Search: shrink non-matching
                    if (searchTerm && !node.name.toLowerCase().includes(searchTerm)) {
                        return base * 0.3;
                    }
                    // New node: pulse larger
                    const newTime = newNodeTimes[node.id];
                    if (newTime) {
                        const age = Date.now() - newTime;
                        if (age < GLOW_DURATION) {
                            const scale = 1 + 3 * Math.max(0, 1 - age / GLOW_DURATION);
                            return base * scale;
                        }
                    }
                    return base;
                })
                .nodeOpacity(0.85)
                .nodeLabel('')  // We use hover panel instead

                // Link appearance
                .linkWidth(link => Math.max(0.3, (link.nars_confidence || 0.5) * 2))
                .linkColor(link => {
                    if (searchTerm) {
                        const s = (typeof link.source === 'object') ? link.source : {name:''};
                        const t = (typeof link.target === 'object') ? link.target : {name:''};
                        if (!s.name?.toLowerCase().includes(searchTerm) &&
                            !t.name?.toLowerCase().includes(searchTerm)) {
                            return 'rgba(30,30,40,0.1)';
                        }
                    }
                    return 'rgba(100,100,120,0.35)';
                })
                .linkOpacity(0.6)
                .linkDirectionalArrowLength(3)
                .linkDirectionalArrowRelPos(0.95)
                .linkDirectionalParticles(link => {
                    // Particles on new links
                    const s = (typeof link.source === 'object') ? link.source.id : link.source;
                    const t = (typeof link.target === 'object') ? link.target.id : link.target;
                    const key = s + '_' + t;
                    if (newNodeTimes['link_' + key]) {
                        const age = Date.now() - newNodeTimes['link_' + key];
                        if (age < GLOW_DURATION) return 4;
                        delete newNodeTimes['link_' + key];
                    }
                    return 0;
                })
                .linkDirectionalParticleWidth(2)
                .linkDirectionalParticleSpeed(0.008)
                .linkDirectionalParticleColor(() => '#00ff88')

                // Hover
                .onNodeHover(node => {
                    hoveredNode = node;
                    const panel = document.getElementById('hover-panel');
                    if (node) {
                        panel.classList.add('visible');
                        document.getElementById('h-name').textContent = node.name;
                        const badge = document.getElementById('h-type');
                        badge.textContent = node.type;
                        badge.style.background = TYPE_COLORS[node.type] || '#666';
                        document.getElementById('h-desc').textContent = node.description || 'No description';
                        document.getElementById('h-rung').textContent = 'R' + (node.rung || 0);
                        document.getElementById('h-conf').textContent = (node.nars_confidence || 0).toFixed(2);
                        document.getElementById('h-evid').textContent = node.evidence_count || 0;
                        document.getElementById('h-conn').textContent = connectionCount[node.id] || 0;
                    } else {
                        panel.classList.remove('visible');
                    }
                })

                // Click to focus
                .onNodeClick(node => {
                    const distance = 60;
                    graph.cameraPosition(
                        { x: node.x + distance, y: node.y + distance/2, z: node.z + distance },
                        node, 1500
                    );
                });

            // Animation loop for glow refresh
            setInterval(() => {
                if (Object.keys(newNodeTimes).length > 0 && graph) {
                    graph.nodeColor(graph.nodeColor());
                    graph.nodeVal(graph.nodeVal());
                    graph.linkDirectionalParticles(graph.linkDirectionalParticles());
                }
            }, 200);
        }

        // ── WebSocket ───────────────────────────────────────────────────
        function connect() {
            ws = new WebSocket(WS_URL);
            const dot = document.getElementById('live-dot');

            ws.onopen = () => {
                dot.classList.add('connected');
                console.log('WebSocket connected');
            };

            ws.onclose = () => {
                dot.classList.remove('connected');
                console.log('WebSocket disconnected, reconnecting...');
                setTimeout(connect, RECONNECT_DELAY);
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
                ws.close();
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                if (msg.type === 'init') {
                    // Full graph load
                    graphData.nodes = msg.nodes;
                    graphData.links = msg.links;

                    // Build node map
                    nodeMap = {};
                    msg.nodes.forEach(n => {
                        nodeMap[n.id] = n;
                        updateLegend(n.type);
                    });
                    rebuildConnectionCounts();

                    if (!graph) initGraph();
                    graph.graphData(graphData);

                    document.getElementById('node-count').textContent = graphData.nodes.length;
                    document.getElementById('link-count').textContent = graphData.links.length;
                    document.getElementById('loading').classList.add('hidden');

                    setTimeout(() => graph.zoomToFit(1500), 800);
                }

                else if (msg.type === 'node') {
                    const node = msg.node;
                    if (nodeMap[node.id]) return; // Already have it

                    nodeMap[node.id] = node;
                    newNodeTimes[node.id] = Date.now();
                    newCount++;
                    updateLegend(node.type);

                    // Add to graph
                    graphData.nodes.push(node);
                    graph.graphData(graphData);

                    document.getElementById('node-count').textContent = graphData.nodes.length;
                    document.getElementById('new-count').textContent = newCount;
                    addFeedItem(`<span class="new-name">${node.name}</span> <span style="color:#555">(${node.type})</span>`);
                }

                else if (msg.type === 'link') {
                    const link = msg.link;

                    // Mark as new for particle animation
                    newNodeTimes['link_' + link.source + '_' + link.target] = Date.now();
                    newCount++;

                    // Update connection counts
                    connectionCount[link.source] = (connectionCount[link.source] || 0) + 1;
                    connectionCount[link.target] = (connectionCount[link.target] || 0) + 1;

                    // Add to graph
                    graphData.links.push(link);
                    graph.graphData(graphData);

                    document.getElementById('link-count').textContent = graphData.links.length;
                    document.getElementById('new-count').textContent = newCount;

                    const srcName = nodeMap[link.source]?.name || link.source;
                    const tgtName = nodeMap[link.target]?.name || link.target;
                    addFeedItem(`${srcName} <span class="new-verb">${link.verb}</span> ${tgtName}`);
                }
            };
        }

        // ── Start ───────────────────────────────────────────────────────
        connect();
    })();
    </script>
</body>
</html>
